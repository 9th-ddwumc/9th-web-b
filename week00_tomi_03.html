<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>UMC Study Plan</h1>
      <hr class="underline">
      <input id="todo-input" type="text" placeholder="스터디 계획을 작성해보세요!">
    </header>

    <main>
      <section>
        <h2>해야 할 일</h2>
        <ul id="todo-list"></ul>
      </section>

      <section>
        <h2>해낸 일</h2>
        <ul id="done-list"></ul>
      </section>
    </main>
  </div>

  <script src="js.js"></script>
</body>
</html>
