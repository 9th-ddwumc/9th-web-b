<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Transition</title>
	<style>
    .box {
      margin:20px auto;
      width: 300px;
      height: 300px;
      background-color: rgb(255, 182, 195);
      transition:background-color 0.5s;  /
    }
    .box:hover{
        background-color: rgb(95, 15, 104);
    }
	</style>
</head>

<body>
	<div class="box"></div>	
    <div class="box"></div>	
    <div class="box"></div>	
</body>
</html>
