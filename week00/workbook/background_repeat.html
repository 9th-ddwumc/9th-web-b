<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
 
  .box {
    width: 500px;
    height: 200px;
    margin: 100px;
    background-image: url("https://postfiles.pstatic.net/MjAyNTA5MTZfMTY4/MDAxNzU4MDAyMzk3Mzc2.IAoVfybw8E9PsKQP-MFNwGdqaUOCKFv5qQl2cWbGNzQg.LZ7CtzaLQ4Tsw7kEMRbo6WPNZ8cLFJVS40YPVLGtEykg.PNG/%EC%9D%BC%EB%9F%AC%EC%8A%A4%ED%8A%B82.png?type=w580");
    background-color: #000000;
  }

  .repeat {
    background-repeat: repeat;
  }

  .repeat-x {
    background-repeat: repeat-x;
  }

  .repeat-y {
    background-repeat: repeat-y;
  }

  .no-repeat {
    background-repeat: no-repeat;
  }

</style>
</head>
<body>

  
  <div class="box repeat"></div>
  <div class="box repeat-x"></div>
  <div class="box repeat-y"></div>
  <div class="box no-repeat"></div>

</body>
</html>
